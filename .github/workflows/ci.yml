name: API CI/CD

on:
  push:
    branches: [develop, main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/CODEOWNERS"
  workflow_dispatch:

concurrency:
  group: api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: solidcare
          POSTGRES_PASSWORD: solidcare
          POSTGRES_DB: solidcare_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install ruff -r requirements.txt pytest-env bcrypt==4.0.1

      - name: Lint with Ruff
        run: ruff check app tests

      - name: Run database migrations
        env:
          ENV: test
          DATABASE_URL: postgresql+asyncpg://solidcare:solidcare@localhost:5432/solidcare_test
          JWT_SECRET_KEY: test-secret-key-for-ci-only
        run: alembic upgrade head

      - name: Run tests
        env:
          ENV: test
          DATABASE_URL: postgresql+asyncpg://solidcare:solidcare@localhost:5432/solidcare_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-only
        run: pytest tests/ -v --tb=short

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          scanners: vuln
          skip-dirs: .venv

  build-package:
    name: Build Deployment Package
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Build offline App Service package
        run: bash scripts/azure/build-deploy-package.sh "$RUNNER_TEMP/api-package"

      - name: Create zip
        run: |
          cd "$RUNNER_TEMP/api-package"
          zip -r -q "$RUNNER_TEMP/solidcare-api.zip" . -x "**/__pycache__/*" "**/*.pyc"
          ls -lh "$RUNNER_TEMP/solidcare-api.zip"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-deploy-package
          path: ${{ runner.temp }}/solidcare-api.zip
          retention-days: 7

  deploy-dev:
    name: Deploy to Azure App Service (Dev)
    runs-on: ubuntu-latest
    needs: build-package
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    environment: development
    env:
      AZURE_RESOURCE_GROUP: solidev
      AZURE_WEBAPP_NAME: solidcare-api-dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-deploy-package
          path: artifact

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy via run-from-package (blob)
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          chmod +x scripts/azure/deploy-run-from-package.sh
          bash scripts/azure/deploy-run-from-package.sh artifact/solidcare-api.zip

      - name: Health check
        continue-on-error: true
        run: |
          for i in $(seq 1 5); do
            body=$(curl -sf --max-time 10 "https://${AZURE_WEBAPP_NAME}.azurewebsites.net/health" || true)
            echo "Attempt $i: $body"
            if echo "$body" | grep -q '"status".*"healthy"'; then
              echo "API healthy"
              exit 0
            fi
            echo "Waiting for API warm-up ($i/5)..."
            sleep 10
          done
          echo "::warning::Health check did not pass — app may still be warming up or quota-limited"
          exit 1
